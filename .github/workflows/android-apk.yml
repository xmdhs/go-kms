name: Android APK

on:
  workflow_dispatch:
  push:
    branches: ["**"]
    tags: ["v*"]
  pull_request:
    branches: [master]

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: sdkmanager "platforms;android-35" "build-tools;35.0.0" "ndk;27.2.12479018"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.10.2

      - name: Build Go Android binaries
        run: |
          set -euxo pipefail
          rm -rf android/app/src/main/jniLibs
          mkdir -p android/app/src/main/jniLibs/arm64-v8a
          mkdir -p android/app/src/main/jniLibs/armeabi-v7a
          mkdir -p android/app/src/main/jniLibs/x86_64

          NDK="$ANDROID_HOME/ndk/27.2.12479018"
          TOOLCHAIN="$NDK/toolchains/llvm/prebuilt/linux-x86_64/bin"

          CGO_ENABLED=1 GOOS=android GOARCH=arm64 CC="$TOOLCHAIN/aarch64-linux-android23-clang" \
            go build -trimpath -ldflags="-s -w" \
            -o android/app/src/main/jniLibs/arm64-v8a/libgo_kms.so .

          CGO_ENABLED=1 GOOS=android GOARCH=arm GOARM=7 CC="$TOOLCHAIN/armv7a-linux-androideabi23-clang" \
            go build -trimpath -ldflags="-s -w" \
            -o android/app/src/main/jniLibs/armeabi-v7a/libgo_kms.so .

          CGO_ENABLED=1 GOOS=android GOARCH=amd64 CC="$TOOLCHAIN/x86_64-linux-android23-clang" \
            go build -trimpath -ldflags="-s -w" \
            -o android/app/src/main/jniLibs/x86_64/libgo_kms.so .

          file android/app/src/main/jniLibs/*/libgo_kms.so

      - name: Build APK
        working-directory: android
        run: gradle :app:assembleDebug --no-daemon --stacktrace

      - name: Verify APK contains native executables
        run: |
          set -euxo pipefail
          unzip -l android/app/build/outputs/apk/debug/app-debug.apk | grep 'lib/.*/libgo_kms.so'

      - name: Sign APK
        env:
          SIGNING_KEY: ${{ secrets.SIGNING_KEY }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        run: |
          set -euxo pipefail
          echo "$SIGNING_KEY" | base64 -d > signing-key.jks
          $ANDROID_HOME/build-tools/35.0.0/zipalign -f 4 android/app/build/outputs/apk/debug/app-debug.apk android/app/build/outputs/apk/debug/app-aligned.apk
          $ANDROID_HOME/build-tools/35.0.0/apksigner sign \
            --ks signing-key.jks \
            --ks-pass pass:$KEYSTORE_PASSWORD \
            --key-pass pass:$KEY_PASSWORD \
            --ks-key-alias "$KEY_ALIAS" \
            --out android/app/build/outputs/apk/debug/app-debug.apk \
            android/app/build/outputs/apk/debug/app-aligned.apk
          rm -f android/app/build/outputs/apk/debug/app-aligned.apk signing-key.jks

      - name: Upload APK artifact
        uses: actions/upload-artifact@v7
        with:
          name: go-kms-android-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 3
          archive: false
